services:
  - type: web
    name: solarisweb
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: SOLARIS_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: solaris-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: solaris-db
    plan: free
